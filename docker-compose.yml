# Local development / reference compose file.
# On Dokploy, each service is deployed as a separate application.

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-dev-key}
      # DJANGO_DEBUG defaults to false in settings.py so prod stays safe
      # (DEBUG=True leaks stack traces and leaks memory via connection.queries).
      - DJANGO_DEBUG=${DJANGO_DEBUG:-false}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost:3000}
      - CYT_MCP_TOKEN=${CYT_MCP_TOKEN:-}
      - CYT_BROADCAST_SECRET=${CYT_BROADCAST_SECRET:-dev-broadcast-secret}
    volumes:
      - db-data:/app/db.sqlite3

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db-data:
